version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: contextcraft-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: contextcraft
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: contextcraft-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
