spring.config.import=optional:dotenv:./env,optional:dotenv:../env,optional:dotenv:.env,optional:dotenv:./.env,optional:dotenv:../.env
spring.application.name=portal

# Database Configuration (PostgreSQL)
spring.datasource.url=${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:contextcraft}}
spring.datasource.username=${DB_USERNAME:${DB_USER:admin}}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway Migrations
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Quartz Scheduler
spring.quartz.job-store-type=jdbc
spring.quartz.jdbc.initialize-schema=always
spring.quartz.properties.org.quartz.jobStore.driverDelegateClass=org.quartz.impl.jdbcjobstore.PostgreSQLDelegate

# JWT Configuration
# IMPORTANT: Replace with a strong 256-bit Base64-encoded secret before deploying
app.jwt.secret=${JWT_SECRET:Y2hhbmdlbWVjaGFuZ2VtZWNoYW5nZW1lY2hhbmdlbWVjaGFuZ2VtZWNoYW5nZW0=}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Telegram Bot API
app.telegram.bot-token=${TELEGRAM_BOT_TOKEN:}
app.telegram.webhook-secret=${TELEGRAM_WEBHOOK_SECRET:}
app.telegram.public-webhook-url=${TELEGRAM_PUBLIC_WEBHOOK_URL:}

# Gemini AI Configuration
app.gemini.api-key=${GEMINI_API_KEY:}
app.gemini.model=${GEMINI_MODEL:gemini-2.0-flash}

# Conversation & Confirmation Settings
app.confirmation.timeout-seconds=${CONFIRMATION_TIMEOUT_SECONDS:300}
