spring.application.name=portal

# Database Configuration (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5433/contextcraft
spring.datasource.username=admin
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway Migrations
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Quartz Scheduler
spring.quartz.job-store-type=jdbc
spring.quartz.jdbc.initialize-schema=always
spring.quartz.properties.org.quartz.jobStore.driverDelegateClass=org.quartz.impl.jdbcjobstore.PostgreSQLDelegate

# JWT Configuration
# IMPORTANT: Replace with a strong 256-bit Base64-encoded secret before deploying
app.jwt.secret=Y2hhbmdlbWVjaGFuZ2VtZWNoYW5nZW1lY2hhbmdlbWVjaGFuZ2VtZWNoYW5nZW0=
app.jwt.expiration-ms=86400000

# WhatsApp Business API
app.whatsapp.api-url=https://graph.facebook.com/v19.0
app.whatsapp.phone-number-id=REPLACE_ME
app.whatsapp.access-token=REPLACE_ME
app.whatsapp.verify-token=REPLACE_ME_RANDOM_SECRET
app.whatsapp.app-secret=REPLACE_ME

# Telegram Bot API
app.telegram.bot-token=${TELEGRAM_BOT_TOKEN:REPLACE_ME}
app.telegram.webhook-secret=${TELEGRAM_WEBHOOK_SECRET:REPLACE_ME}

